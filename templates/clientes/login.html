{% extends 'base.html' %}
{% load static %}

{% block title %}Entrar — Aquawoman{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-12">
  <div class="bg-white rounded-2xl border border-gray-100 p-8">

    <div class="text-center mb-6">
      <h1 class="text-xl font-semibold text-gray-800 mb-1">Entrar na conta</h1>
      <p class="text-sm text-gray-500">Acesse seus pedidos e dados</p>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="mb-4">
        <label class="text-xs text-gray-500 mb-1 block">Email</label>
        <input type="email" name="email" required
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"
          placeholder="seu@email.com">
      </div>
      <div class="mb-6">
        <label class="text-xs text-gray-500 mb-1 block">Senha</label>
        <input type="password" name="senha" required
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm"
          placeholder="••••••••">
      </div>
      <button type="submit"
        class="w-full bg-[#29AADF] text-white py-3 rounded-xl font-medium hover:bg-[#1A3FAA] transition mb-4">
        Entrar
      </button>
    </form>

    <p class="text-sm text-gray-500 text-center">
      Não tem conta?
      <a href="{% url 'clientes:cadastro' %}" class="text-[#29AADF] hover:underline">Cadastre-se</a>
    </p>

  </div>
</div>
{% endblock %}
