{% extends 'base.html' %}
{% load static %}

{% block title %}Produtos — Aquawoman{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8">

  <!-- Busca -->
  <div class="mb-4">
    <input
      type="text"
      name="busca"
      value="{{ busca }}"
      placeholder="🔍 Buscar produto..."
      hx-get="/produtos/"
      hx-target="#lista-produtos"
      hx-swap="innerHTML"
      hx-trigger="keyup changed delay:300ms"
      hx-include="[name='busca']"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#29AADF] bg-white shadow-sm">
  </div>

  <!-- Categorias -->
  <div class="grid grid-cols-2 md:flex md:flex-wrap gap-2 mb-6">
  <button
    hx-get="/produtos/"
    hx-target="#lista-produtos"
    hx-swap="innerHTML"
    onclick="setAtivo(this)"
    class="cat-btn bg-[#29AADF] text-white text-xs md:text-sm px-4 py-2 rounded-full flex items-center justify-center">
    Todos
  </button>
  {% for categoria in categorias %}
  <button
    hx-get="/produtos/?categoria={{ categoria.slug }}"
    hx-target="#lista-produtos"
    hx-swap="innerHTML"
    onclick="setAtivo(this)"
    class="cat-btn border border-[#29AADF] text-[#1A3FAA] text-xs md:text-sm px-4 py-2 rounded-full hover:bg-[#29AADF] hover:text-white transition flex items-center justify-center">
    {{ categoria.icone }} {{ categoria.nome }}
  </button>
  {% endfor %}
</div>

  <!-- Lista de produtos -->
  <h2 class="text-lg font-semibold mb-4 text-gray-700">🛒 Produtos</h2>
  <div id="lista-produtos">
    {% include 'produtos/partials/lista_produtos.html' %}
  </div>

</div>

{% endblock %}
