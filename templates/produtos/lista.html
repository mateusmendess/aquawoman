{% extends 'base.html' %}
{% load static %}

{% block title %}Produtos — Aquawoman{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8">

  <!-- Busca -->
  <div class="mb-4 relative">
    <input
      type="text"
      name="busca"
      id="input-busca"
      value="{{ busca }}"
      placeholder="🔍 Buscar produto..."
      hx-get="/produtos/"
      hx-target="#lista-produtos"
      hx-swap="innerHTML"
      hx-trigger="keyup changed delay:300ms"
      hx-include="[name='busca'], .cat-check:checked"
      oninput="toggleBtnLimpar(this)"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#29AADF] bg-white shadow-sm pr-10">
    <button
      type="button"
      id="btn-limpar-busca"
      onclick="limparBusca()"
      class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition"
      style="display:none;">
      <i class="ti ti-x text-sm" aria-hidden="true"></i>
    </button>
  </div>

  <!-- Filtro dropdown -->
  <div class="flex items-center gap-2 mb-6 flex-wrap">
    <div class="relative" id="filtro-wrapper">
      <button
        type="button"
        id="btn-filtro"
        onclick="toggleFiltro()"
        class="inline-flex items-center gap-2 border-2 border-[#29AADF] text-[#1A3FAA] text-sm font-medium px-4 py-2 rounded-full transition hover:bg-[#29AADF] hover:text-white">
        <i class="ti ti-filter text-sm" aria-hidden="true"></i>
        <span>Todas as categorias</span>
        <i class="ti ti-chevron-down text-xs" id="icon-chevron" aria-hidden="true"></i>
      </button>

      <div id="dropdown-categorias"
        class="hidden absolute top-full left-0 mt-2 bg-white border border-gray-100 rounded-xl shadow-lg z-50 min-w-[240px] p-2 max-h-80 overflow-y-auto">
        {% for categoria in categorias %}
        <label class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-700 cursor-pointer hover:bg-[#EFF8FD] hover:text-[#1A3FAA]">
          <input
            type="checkbox"
            value="{{ categoria.slug }}"
            data-nome="{{ categoria.nome }}"
            onchange="atualizarFiltros()"
            class="cat-check accent-[#29AADF] w-4 h-4 cursor-pointer">
          {{ categoria.nome }}
        </label>
        {% endfor %}
      </div>
    </div>

    <!-- Tags das categorias selecionadas -->
    <div id="tags-categorias" class="flex flex-wrap gap-2"></div>
  </div>

  <!-- Lista de produtos -->
  <h2 class="text-lg font-semibold mb-4 text-gray-700">🛒 Produtos</h2>
  <div id="lista-produtos">
    {% include 'produtos/partials/lista_produtos.html' %}
  </div>

</div>

<script>
function toggleFiltro() {
  var menu = document.getElementById('dropdown-categorias');
  var icon = document.getElementById('icon-chevron');
  var aberto = !menu.classList.contains('hidden');
  menu.classList.toggle('hidden');
  icon.style.transform = aberto ? 'rotate(0deg)' : 'rotate(180deg)';
}

function atualizarFiltros() {
  var checks = document.querySelectorAll('.cat-check:checked');
  var slugs = Array.from(checks).map(c => c.value);
  var nomes = Array.from(checks).map(c => c.dataset.nome);

  // Atualiza tags
  var tagsDiv = document.getElementById('tags-categorias');
  tagsDiv.innerHTML = '';
  nomes.forEach(function(nome, i) {
    var tag = document.createElement('span');
    tag.className = 'inline-flex items-center gap-2 bg-[#EFF8FD] text-[#1A3FAA] text-xs font-medium px-3 py-1.5 rounded-full border border-[#29AADF]';
    tag.innerHTML = nome + ' <button type="button" onclick="removerFiltro(\'' + slugs[i] + '\')" class="hover:text-red-500 transition">✕</button>';
    tagsDiv.appendChild(tag);
  });

  // Dispara HTMX
  var url = '/produtos/';
  if (slugs.length > 0) {
    url += '?' + slugs.map(s => 'categoria=' + s).join('&');
  }
  htmx.ajax('GET', url, {target: '#lista-produtos', swap: 'innerHTML'});
}

function removerFiltro(slug) {
  var check = document.querySelector('.cat-check[value="' + slug + '"]');
  if (check) {
    check.checked = false;
    atualizarFiltros();
  }
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#filtro-wrapper')) {
    document.getElementById('dropdown-categorias').classList.add('hidden');
    document.getElementById('icon-chevron').style.transform = 'rotate(0deg)';
  }
});

function toggleBtnLimpar(input) {
  document.getElementById('btn-limpar-busca').style.display = input.value ? 'block' : 'none';
}

function limparBusca() {
  var input = document.getElementById('input-busca');
  input.value = '';
  document.getElementById('btn-limpar-busca').style.display = 'none';
  htmx.ajax('GET', '/produtos/', {target: '#lista-produtos', swap: 'innerHTML'});
}
</script>

{% endblock %}
