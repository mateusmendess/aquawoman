{% extends 'base.html' %}
{% load static %}

{% block title %}Carrinho — Aquawoman{% endblock %}

{% block content %}
<div style="max-width: 560px; width: 100%; margin: 0 auto; padding: 32px 16px;">

  <h1 class="text-xl font-semibold text-gray-800 mb-6">🛒 Meu Carrinho</h1>

  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden mb-4 w-full">
    <div id="itens-carrinho">
      {% include 'pedidos/partials/itens_carrinho.html' %}
    </div>
  </div>

  <div class="flex flex-col gap-2">
    <a href="{% url 'pedidos:checkout' %}" class="w-full bg-[#29AADF] text-white text-sm py-2.5 rounded-xl text-center hover:bg-[#1A3FAA] transition font-medium">
      Finalizar pedido →
    </a>
    <a href="/produtos/" class="w-full border border-[#29AADF] text-[#1A3FAA] text-sm py-2.5 rounded-xl text-center hover:bg-blue-50 transition">
      Continuar comprando
    </a>
  </div>
</div>
{% endblock %}
