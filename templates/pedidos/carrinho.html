{% extends 'base.html' %}
{% load static %}

{% block title %}Carrinho — Aquawoman{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">

  <h1 class="text-xl font-semibold text-gray-800 mb-6">🛒 Meu Carrinho</h1>

  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden mb-4 w-full">
    <div id="itens-carrinho">
      {% include 'pedidos/partials/itens_carrinho.html' %}
    </div>
  </div>

  <div class="flex gap-3">
    <a href="/" class="flex-1 border border-[#29AADF] text-[#1A3FAA] text-sm py-3 rounded-xl text-center hover:bg-blue-50 transition">
      Continuar comprando
    </a>
    <a href="{% url 'pedidos:checkout' %}" class="flex-1 bg-[#29AADF] text-white text-sm py-3 rounded-xl text-center hover:bg-[#1A3FAA] transition font-medium">
        Finalizar pedido →
    </a>
  </div>

</div>
{% endblock %}
